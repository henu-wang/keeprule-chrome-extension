<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>KeepRule - Daily Investment Wisdom</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 128 128">
          <circle cx="64" cy="64" r="60" fill="#1a2744"/>
          <text x="64" y="82" text-anchor="middle" font-size="72" font-weight="bold" fill="#c9a84c" font-family="Georgia, serif">K</text>
        </svg>
        <span class="logo-text">KeepRule</span>
      </div>
      <span class="subtitle">Daily Investment Wisdom</span>
    </header>

    <!-- Quote Card -->
    <div class="card">
      <div class="quote-mark">"</div>
      <p class="quote-text" id="quoteText"></p>
      <div class="author-row">
        <div class="author-avatar" id="authorAvatar"></div>
        <div class="author-info">
          <span class="author-name" id="authorName"></span>
          <span class="author-title" id="authorTitle"></span>
        </div>
      </div>
      <button class="refresh-btn" id="refreshBtn" title="Show another principle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Another principle
      </button>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <a href="https://keeprule.com" target="_blank" class="action-btn primary">
        <span class="action-icon">&#x1F4CA;</span>
        <span>Explore Principles</span>
      </a>
      <a href="https://keeprule.com/quiz" target="_blank" class="action-btn secondary">
        <span class="action-icon">&#x1F3AF;</span>
        <span>Investor Quiz</span>
      </a>
      <a href="https://keeprule.com/scenarios" target="_blank" class="action-btn secondary">
        <span class="action-icon">&#x1F4D6;</span>
        <span>Investment Scenarios</span>
      </a>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Powered by</span>
      <a href="https://keeprule.com" target="_blank">KeepRule</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
